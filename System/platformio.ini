; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	z3t0/IRremote@^4.5.0
	pablomarquez76/PS4_Controller_Host@^1.1.0
build_flags =
	-O2
	-std=c++17
	-Wno-unknown-pragmas
	-Wno-pragmas
	-D BYTE_SIZE=256
	-D BUFFER_SIZE=512
	-D STACK_SIZE=4096
	-D A_1=19
	-D A_2=18
	-D B_1=17
	-D B_2=16
	-D LED=2
	-D IR_TRIGGER=13
	-D SENSOR_TRANSISTOR=25
	-D SENSOR_LEFT=36
	-D SENSOR_FRONT=39
	-D SENSOR_RIGHT=34
	-D RECEIVER_LEFT=27
	-D RECEIVER_FRONT=4
	-D RECEIVER_RIGHT=23
build_src_flags =
	-Wall
	-Wextra
	-Werror
monitor_speed = 115200
