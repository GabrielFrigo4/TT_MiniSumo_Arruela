[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

lib_deps =
	z3t0/IRremote@^4.5.0
	pablomarquez76/PS4_Controller_Host@^1.1.0
	pololu/VL53L0X@^1.3.1

build_unflags =
	-std=c++11
	-std=c++14
	-std=gnu++11
	-std=gnu++14

build_flags =
	-O2
	-std=gnu++17
	-Wno-unknown-pragmas
	-Wno-pragmas
	-D DEFAULT_SOURCE
	-D POSIX_C_SOURCE=202405L
	-D FORTIFY_SOURCE=2

	-D BYTE_SIZE=256
	-D BUFFER_SIZE=512
	-D STACK_SIZE=4096

	-D MODERN_ELECTRONICS
	-D DEFAULT_KERNEL_STATE=-1
	-D ENGINE_LEFT_1=17
	-D ENGINE_LEFT_2=16
	-D ENGINE_RIGHT_1=19
	-D ENGINE_RIGHT_2=18
	-D INTERNAL_LED=2
	-D INFRARED_TRIGGER=13
	-D SENSOR_TRANSISTOR=25
	-D SENDER_LEFT=36
	-D SENDER_FRONT=34
	-D SENDER_RIGHT=39
	-D RECEIVER_LEFT=32
	-D RECEIVER_RIGHT=5
	-D SENSOR_LINE=32
	-D SENSOR_DATA=21
	-D SENSOR_CLOCK=22

;	-D DEFAULT_KERNEL_STATE=1
;	-D ENGINE_LEFT_PWM=23
;	-D ENGINE_LEFT_1=18
;	-D ENGINE_LEFT_2=19
;	-D ENGINE_RIGHT_PWM=4
;	-D ENGINE_RIGHT_1=16
;	-D ENGINE_RIGHT_2=17
;	-D ENGINE_STANDBY=5
;	-D INTERNAL_LED=2
;	-D INFRARED_TRIGGER=13
;	-D SENSOR_TRANSISTOR=25
;	-D SENDER_RIGHT=34
;	-D SENDER_FRONT=36
;	-D SENDER_LEFT=39
;	-D RECEIVER_LEFT=5
;	-D RECEIVER_RIGHT=23
;	-D SENSOR_LINE=32
;	-D SENSOR_DATA=21
;	-D SENSOR_CLOCK=22

build_src_flags =
	-Wformat=2
	-Wall
	-Wextra
	-Wvla
	-Wshadow
	-Werror
	-Wno-cpp
	-Wno-missing-field-initializers
	-Wno-unknown-warning-option

monitor_speed = 115200
